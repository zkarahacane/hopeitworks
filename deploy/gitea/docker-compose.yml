# Gitea self-hosted Git service + Actions runner stack
# Usage:
#   docker compose up -d          # Start stack
#   ./setup.sh                    # First-time setup (admin user, repo, runner token)
#   docker compose down -v        # Full teardown including volumes

services:
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    restart: unless-stopped
    environment:
      # App identity
      - GITEA__app_name=hopeitworks Gitea
      # Database: SQLite3 (no external DB needed for local dev)
      - GITEA__database__DB_TYPE=sqlite3
      - GITEA__database__PATH=/data/gitea/gitea.db
      # Server config
      - GITEA__server__ROOT_URL=http://localhost:3030
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__DISABLE_SSH=true
      - GITEA__server__LFS_START_SERVER=false
      # Security: disable self-registration, admin creates users only
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
      # Actions (Gitea CI)
      - GITEA__actions__ENABLED=true
      # Skip install page — we configure everything via env vars + CLI
      - GITEA__security__INSTALL_LOCK=true
      # Logging
      - GITEA__log__LEVEL=info
    ports:
      - "3030:3000"   # Web UI (host 3030 → container 3000)
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/version"]  # internal port
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  runner:
    image: gitea/act_runner:latest
    container_name: gitea-runner
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      # Gitea instance URL (internal docker network)
      - GITEA_INSTANCE_URL=http://gitea:3000
      # Registration token — written by setup.sh into .env file
      # Run `docker compose up -d runner` after setup.sh to register
      - GITEA_RUNNER_REGISTRATION_TOKEN=${GITEA_RUNNER_REGISTRATION_TOKEN:-}
      - GITEA_RUNNER_NAME=local-runner
      - GITEA_RUNNER_LABELS=ubuntu-latest:docker://catthehacker/ubuntu:act-latest,node:docker://catthehacker/ubuntu:act-latest
    volumes:
      # Docker socket: runner spawns job containers on the host daemon
      - /var/run/docker.sock:/var/run/docker.sock
      # Runner state (registration cache, etc.)
      - runner-data:/data
      # Custom runner config (label → image mapping)
      - ./runner-config.yaml:/config.yaml:ro
    # Pass custom config path to the runner
    command: ["daemon", "--config", "/config.yaml"]

volumes:
  gitea-data:
    driver: local
  runner-data:
    driver: local
