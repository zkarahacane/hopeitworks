# act_runner configuration
# Maps runner labels to Docker images used to execute CI jobs.
# Labels are advertised to Gitea and matched against `runs-on:` in workflow files.
#
# Reference: https://gitea.com/gitea/act_runner/src/branch/main/internal/pkg/config/config.example.yaml

log:
  level: info

runner:
  # File to cache the runner registration state
  file: /data/.runner
  # Maximum number of concurrent jobs this runner will accept
  capacity: 4
  # Extra env vars injected into every job container
  envs: {}
  # Timeout for a single job
  timeout: 3h
  # Shut down gracefully, waiting for running jobs
  shutdown_timeout: 5m
  # Labels advertised to Gitea — format: "label:schema://image"
  # ubuntu-latest and node both map to the same act image
  labels:
    - "ubuntu-latest:docker://catthehacker/ubuntu:act-latest"
    - "node:docker://catthehacker/ubuntu:act-latest"

cache:
  # Disable built-in cache server (use actions/cache from marketplace instead)
  enabled: false

container:
  # Network mode for job containers — bridge keeps them isolated but able to reach host
  network: bridge
  # Automatically remove job containers after completion
  auto_remove: true
  # Valid volume mounts allowed inside job containers
  valid_volumes:
    - "**"
  # docker-in-docker: false — runner uses the host Docker socket mounted at /var/run/docker.sock
  docker_host: "-"
  # Force pull images before each run to keep them fresh
  force_pull: false

host:
  # Working directory on the runner host for cloning repos
  workdir_parent: /data/job-workspaces
