# Dev seed data: after starting the stack, run `cd backend && make seed` to populate
# test users and projects. Run `cd backend && make reset-db` to drop, recreate, and seed.

services:
  # Filtered proxy for the Docker socket — the API service needs to spawn agent
  # containers but should NOT have unrestricted access to the Docker daemon.
  # This proxy only allows container and network operations (no volumes, no exec,
  # no swarm). On Kubernetes this role is replaced by a scoped ServiceAccount + RBAC.
  # Compatible with any runtime exposing a Docker-compatible socket (Podman, Colima, OrbStack, Rancher Desktop with dockerd).
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: hopeitworks-socket-proxy
    environment:
      CONTAINERS: 1   # allow container create/start/stop/inspect
      NETWORKS: 1     # allow network connect (agent-network)
      POST: 1         # required for create/start operations
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hopeitworks
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hopeitworks-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hopeitworks_dev}
      POSTGRES_USER: ${POSTGRES_USER:-hopeitworks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hopeitworks_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hopeitworks} -d ${POSTGRES_DB:-hopeitworks_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - hopeitworks

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hopeitworks-api
    environment:
      # --- application ---
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SERVER_PORT: ${SERVER_PORT:-8080}
      # --- database ---
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hopeitworks_dev}
      DB_USER: ${POSTGRES_USER:-hopeitworks}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hopeitworks_dev_password}
      DB_SSLMODE: disable
      # --- auth ---
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      # --- docker / agent runtime ---
      DOCKER_HOST: tcp://socket-proxy:2375
      # Compose names this network "<project>_agent-network" (project = compose dir, "deploy").
      DOCKER_AGENT_NETWORK: ${DOCKER_AGENT_NETWORK:-deploy_agent-network}
      AGENT_IMAGE: ${AGENT_IMAGE:-hopeitworks/agent-go-node:latest}
      CLAUDE_MD_PATH: ${CLAUDE_MD_PATH:-agent/claude-md}
      # --- agent tokens (required for pipeline execution) ---
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN}
      # --- callback ---
      CALLBACK_BASE_URL: http://api:8080
      # --- encryption ---
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key-32bytes!!}
      # --- smtp ---
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: ${SMTP_FROM:-noreply@hopeitworks.local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    #volumes:
    #  - ../agent/claude-md:/app/agent/claude-md:ro
    ports:
      # Host port decoupled from the app port (SERVER_PORT) so the stack can run
      # alongside other local stacks without port collisions. App still listens on 8080.
      - "${API_HOST_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
      mailhog:
        condition: service_started
    restart: unless-stopped
    networks:
      - hopeitworks
      - agent-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: hopeitworks-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - hopeitworks
    restart: unless-stopped

  # Frontend SPA built and served by nginx. nginx reverse-proxies /api/v1 to the
  # api service (same-origin → cookies + SSE work without CORS). The whole app is
  # reached at http://localhost:${FRONTEND_HOST_PORT:-5173}.
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: hopeitworks-frontend
    environment:
      API_BACKEND: http://api:8080
    ports:
      - "${FRONTEND_HOST_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - hopeitworks

volumes:
  postgres_data:

networks:
  hopeitworks:
    driver: bridge
  # Isolated network for agent containers spawned by the pipeline engine.
  # Not internal — agents need internet access for git clone, API calls, etc.
  agent-network:
    driver: bridge
