# Dev seed data: after starting the stack, run `cd backend && make seed` to populate
# test users and projects. Run `cd backend && make reset-db` to drop, recreate, and seed.

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: hopeitworks-socket-proxy
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - hopeitworks
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    container_name: hopeitworks-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hopeitworks_dev}
      POSTGRES_USER: ${POSTGRES_USER:-hopeitworks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hopeitworks_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hopeitworks}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure
    networks:
      - hopeitworks

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: hopeitworks-api
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-hopeitworks_dev}
      DB_USER: ${POSTGRES_USER:-hopeitworks}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hopeitworks_dev_password}
      DB_SSLMODE: disable
      DOCKER_HOST: tcp://socket-proxy:2375
      DOCKER_AGENT_NETWORK: ${DOCKER_AGENT_NETWORK:-deploy_hopeitworks_agent-network}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: noreply@hopeitworks.local
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      socket-proxy:
        condition: service_started
      mailhog:
        condition: service_started
    restart: on-failure
    networks:
      - hopeitworks

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: hopeitworks-mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - hopeitworks
    restart: on-failure

volumes:
  postgres_data:

networks:
  hopeitworks:
    driver: bridge
  # Isolated network for agent containers spawned by the pipeline engine.
  # Not internal — agents need internet access for git clone, API calls, etc.
  agent-network:
    driver: bridge
