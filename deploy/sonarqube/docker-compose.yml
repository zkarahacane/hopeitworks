# SonarQube Community Edition stack — code quality analysis
# Usage:
#   docker compose -f deploy/sonarqube/docker-compose.yml up -d     # Start
#   docker compose -f deploy/sonarqube/docker-compose.yml down       # Stop (keep volumes)
#   docker compose -f deploy/sonarqube/docker-compose.yml down -v    # Full teardown
#
# SonarQube UI: http://localhost:9000
# Default credentials: admin / admin (change on first login)
#
# NOTE: This uses a dedicated Postgres instance — completely separate from the app DB.
# SonarQube requires vm.max_map_count >= 524288 and fs.file-max >= 131072 on Linux.
# On macOS/Docker Desktop this is handled transparently.

services:
  sonar_postgres:
    image: postgres:16-alpine
    container_name: sonar_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar_password
    volumes:
      - sonar_postgres_data:/var/lib/postgresql/data
    networks:
      - sonarqube
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sonarqube:
    image: sonarqube:community
    container_name: sonar_server
    restart: unless-stopped
    depends_on:
      sonar_postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_postgres:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar_password
      # Raise ES heap for analysis of larger projects
      SONAR_CE_JAVAADDITIONALOPTS: "-Xmx512m"
      SONAR_WEB_JAVAADDITIONALOPTS: "-Xmx512m"
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    networks:
      - sonarqube
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    # SonarQube requires these sysctls on Linux hosts.
    # On Docker Desktop for Mac they are set automatically — uncomment if on Linux.
    # sysctls:
    #   - vm.max_map_count=524288
    #   - fs.file-max=131072
    # ulimits:
    #   nofile:
    #     soft: 65536
    #     hard: 65536
    #   nproc: 4096

volumes:
  sonar_postgres_data:
    driver: local
  sonar_data:
    driver: local
  sonar_extensions:
    driver: local
  sonar_logs:
    driver: local

networks:
  sonarqube:
    name: sonarqube
    driver: bridge
