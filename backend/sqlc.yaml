version: "2"
sql:
  - engine: postgresql
    queries: queries/
    schema: migrations/
    gen:
      go:
        package: postgres
        out: internal/adapter/postgres
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - db_type: timestamptz
            go_type: time.Time
          - db_type: timestamp
            go_type: time.Time
          - db_type: "numeric"
            go_type: float64
