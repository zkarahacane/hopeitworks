name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test-project/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build Docker image
        run: docker build -t todo-app:test .

      - name: Start app for E2E tests
        run: |
          docker run -d --name todo-e2e -p 3000:3000 todo-app:test
          sleep 3
          curl -sf http://localhost:3000/health || (docker logs todo-e2e && exit 1)

      - name: Run E2E tests
        run: bash __tests__/e2e.test.sh

      - name: Cleanup
        if: always()
        run: docker rm -f todo-e2e || true
