<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <h1>Todo App</h1>

      <form id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          required
        />
        <button type="submit">Add</button>
      </form>

      <ul id="todo-list"></ul>

      <p id="empty-message" class="hidden">No todos yet. Add one above.</p>
    </div>

    <script src="app.js"></script>
  </body>
</html>
