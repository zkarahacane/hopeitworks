# SonarQube project configuration — hopeitworks monorepo
# Docs: https://docs.sonarsource.com/sonarqube/latest/project-administration/analysis-scope/
#
# Two modules: backend (Go) and frontend (TypeScript/Vue)
# Run analysis: ./scripts/sonar-scan.sh

sonar.projectKey=hopeitworks
sonar.projectName=hopeitworks
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Monorepo: declare modules
sonar.modules=backend,frontend

# ---------------------------------------------------------------------------
# Module: backend (Go)
# ---------------------------------------------------------------------------
backend.sonar.projectName=hopeitworks-backend
backend.sonar.projectBaseDir=backend

# Sources — all Go code under backend/
backend.sonar.sources=.
backend.sonar.language=go

# Test directories — co-located with source (Go convention: *_test.go files)
# SonarQube Go plugin automatically detects *_test.go files; listing dirs helps scoping
backend.sonar.tests=.
backend.sonar.test.inclusions=**/*_test.go

# Exclusions: generated code (sqlc, oapi-codegen), migrations, testdata
backend.sonar.exclusions=\
  internal/adapter/postgres/*.sql.go,\
  internal/adapter/postgres/models.go,\
  internal/adapter/postgres/db.go,\
  internal/api/handler/gen_server.go,\
  cmd/api/wire_gen.go,\
  migrations/**,\
  testdata/**,\
  vendor/**

# Coverage report — generated by `go test -coverprofile=coverage.out ./...`
# Path is relative to the module base dir
backend.sonar.go.coverage.reportPaths=coverage.out

# golangci-lint report (optional — generate with: golangci-lint run --out-format checkstyle > golangci-report.xml)
# backend.sonar.go.golangciLint.reportPaths=golangci-report.xml

# ---------------------------------------------------------------------------
# Module: frontend (TypeScript / Vue 3)
# ---------------------------------------------------------------------------
frontend.sonar.projectName=hopeitworks-frontend
frontend.sonar.projectBaseDir=frontend

# Sources — only src/, not e2e/ or config files
frontend.sonar.sources=src
frontend.sonar.tests=src,e2e

# Include TypeScript and Vue files
frontend.sonar.inclusions=src/**/*.ts,src/**/*.vue,src/**/*.tsx

# Test file patterns
frontend.sonar.test.inclusions=\
  src/**/*.spec.ts,\
  src/**/*.test.ts,\
  src/**/__tests__/**/*.ts,\
  e2e/**/*.ts

# Exclusions: node_modules, build output, generated API client
frontend.sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  .nuxt/**,\
  src/api/schema.d.ts,\
  src/api/client.ts,\
  coverage/**,\
  playwright-report/**,\
  .playwright/**

# Coverage report — generated by Vitest with lcov reporter
# Enable in vitest.config.ts: coverage: { reporter: ['lcov'], reportsDirectory: 'coverage' }
# Path is relative to the module base dir
frontend.sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript configuration
frontend.sonar.typescript.tsconfigPath=tsconfig.app.json
