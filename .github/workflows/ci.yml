name: CI

on:
  push:
    branches: [main, develop, 'wave-*']
  pull_request:
    branches: [main, develop, 'wave-*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'api/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'api/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hopeitworks
          POSTGRES_PASSWORD: hopeitworks_ci_password
          POSTGRES_DB: hopeitworks_test
        options: >-
          --health-cmd "pg_isready -U hopeitworks"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: hopeitworks_test
      DB_USER: hopeitworks
      DB_PASSWORD: hopeitworks_ci_password
      DB_SSLMODE: disable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Download Go modules
        run: go mod download

      - name: Install codegen tools
        run: make install-tools

      - name: Run codegen
        run: make generate

      - name: Build
        run: go build ./cmd/api

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend/

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Setup Node.js (for redocly)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lint OpenAPI spec
        run: make lint-api

  frontend:
    name: Frontend
    needs: changes
    if: >-
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/

    env:
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --include=optional
          npm rebuild

      - name: Generate API types
        run: npm run generate:api

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test:unit -- --run --passWithNoTests

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/e2e/results/
          retention-days: 7

  semgrep:
    name: Semgrep SAST
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.frontend == 'true' ||
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan backend (Go)
        if: needs.changes.outputs.backend == 'true' || github.event_name != 'pull_request'
        run: semgrep --config auto --include="backend/**" --json -o semgrep-backend.json . || true

      - name: Scan frontend (Vue/TS)
        if: needs.changes.outputs.frontend == 'true' || github.event_name != 'pull_request'
        run: semgrep --config auto --include="frontend/src/**" --json -o semgrep-frontend.json . || true

      - name: Summary
        run: |
          for report in semgrep-backend.json semgrep-frontend.json; do
            if [ -f "$report" ]; then
              echo "=== ${report%.json} findings ==="
              cat "$report" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', [])
          print(f'Total: {len(results)} findings')
          for r in results:
            sev = r['extra']['severity']
            path = r['path']
            line = r['start']['line']
            msg = r['extra']['message'][:120]
            print(f'  [{sev}] {path}:{line} - {msg}')
          " 2>/dev/null || echo "No results"
              echo ""
            fi
          done

  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "changes: ${{ needs.changes.result }}"
          echo "backend: ${{ needs.backend.result }}"
          echo "frontend: ${{ needs.frontend.result }}"

          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::Changes detection failed"
            exit 1
          fi
          if [[ "${{ needs.backend.result }}" == "failure" ]]; then
            echo "::error::Backend checks failed"
            exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "::error::Frontend checks failed"
            exit 1
          fi
          echo "All required checks passed or were correctly skipped"
