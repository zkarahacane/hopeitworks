openapi: 3.0.3
info:
  title: HopeItWorks API
  description: |
    Backend API for the HopeItWorks project management platform.
    This is the single source of truth for the API contract.
  version: 0.1.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: HopeItWorks Team

servers:
  - url: /api/v1
    description: API v1 base path

security:
  - cookieAuth: []

tags:
  - name: auth
    description: Authentication endpoints
  - name: users
    description: User management endpoints
  - name: projects
    description: Project management endpoints
  - name: epics
    description: Epic management endpoints
  - name: runs
    description: Pipeline run management endpoints
  - name: prompt-templates
    description: Prompt template management endpoints
  - name: stories
    description: Story management endpoints
  - name: pipeline-configs
    description: Pipeline configuration endpoints
  - name: hitl
    description: Human-in-the-loop approval endpoints
  - name: notifications
    description: Notification configuration endpoints
  - name: agents
    description: Agent management endpoints
  - name: costs
    description: Cost tracking and observability endpoints

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          headers:
            Set-Cookie:
              schema:
                type: string
              description: httpOnly JWT cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      operationId: loginUser
      summary: Log in an existing user
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
              description: httpOnly JWT cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Log out the current user
      tags: [auth]
      responses:
        "204":
          description: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get the currently authenticated user
      tags: [auth]
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request a password reset link via email
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "202":
          description: Reset email dispatched (always returned — prevents email enumeration)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Set a new password using a reset token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Users ───────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      summary: List all users
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SortByParam"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateUser
      summary: Update a user
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [users]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: User deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me:
    get:
      operationId: getMyProfile
      summary: Get the current user's profile
      tags: [users]
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      operationId: updateMyProfile
      summary: Update the current user's profile (name and/or email)
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/me/password:
    put:
      operationId: changeMyPassword
      summary: Change the current user's password
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Projects ────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      summary: List all projects
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SortByParam"
      responses:
        "200":
          description: Paginated list of projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createProject
      summary: Create a new project
      tags: [projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projects/{id}:
    get:
      operationId: getProject
      summary: Get a project by ID
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateProject
      summary: Update a project
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteProject
      summary: Delete a project
      tags: [projects]
      parameters:
        - $ref: "#/components/parameters/IdPath"
      responses:
        "204":
          description: Project deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Epics ──────────────────────────────────────────────────────────────
  /projects/{projectId}/epics:
    get:
      operationId: listEpics
      summary: List epics for a project with story counts
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - $ref: "#/components/parameters/SortByParam"
      responses:
        "200":
          description: Paginated list of epics with story counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createEpic
      summary: Create a new epic in a project
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEpicRequest"
      responses:
        "201":
          description: Epic created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Epic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/epics/{epicId}:
    get:
      operationId: getEpic
      summary: Get an epic by ID
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
      responses:
        "200":
          description: Epic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Epic"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateEpic
      summary: Update an epic
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEpicRequest"
      responses:
        "200":
          description: Epic updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Epic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      operationId: deleteEpic
      summary: Delete an epic
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
      responses:
        "204":
          description: Epic deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Epic DAG ────────────────────────────────────────────────────────
  /projects/{projectId}/epics/{epicId}/dag:
    get:
      operationId: getEpicDAG
      summary: Get the dependency graph (DAG) for an epic
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
      responses:
        "200":
          description: DAG with nodes and edges
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicDAGResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Cycle detected in story dependencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{projectId}/epics/{epicId}/runs:
    post:
      operationId: launchEpicRun
      summary: Launch a batch run for all stories in an epic (async)
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
      responses:
        "202":
          description: Epic run scheduling accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicRunAccepted"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Cycle detected in story dependencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /projects/{projectId}/epic-runs/{epicRunId}:
    get:
      operationId: getEpicRun
      summary: Get an epic run by ID with per-story status
      tags: [epics]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicRunIdPath"
      responses:
        "200":
          description: Epic run details with per-story status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicRunDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Stories ──────────────────────────────────────────────────────────
  /projects/{projectId}/stories:
    get:
      operationId: listStories
      summary: List stories for a project with optional status filtering
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated list of statuses to filter by (e.g., backlog,running)
        - name: key
          in: query
          required: false
          schema:
            type: string
          description: Story key to look up (returns single story)
      responses:
        "200":
          description: Paginated list of stories or single story by key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryListOrSingle"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: createStory
      summary: Create a new story in a project
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoryRequest"
      responses:
        "201":
          description: Story created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/stories/import:
    post:
      operationId: importStories
      summary: Bulk import stories from markdown with YAML frontmatter
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportStoriesRequest"
      responses:
        "200":
          description: Import result with per-story success and error counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportStoriesResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{projectId}/stories/{storyId}:
    get:
      operationId: getStory
      summary: Get a story by ID
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/StoryIdPath"
      responses:
        "200":
          description: Story details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: updateStory
      summary: Update a story
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/StoryIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoryRequest"
      responses:
        "200":
          description: Story updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Story"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      operationId: deleteStory
      summary: Delete a story
      tags: [stories]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/StoryIdPath"
      responses:
        "204":
          description: Story deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Runs ─────────────────────────────────────────────────────────────
  /projects/{projectId}/runs:
    get:
      operationId: listRunsByProject
      summary: List runs for a project
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated list of runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createRun
      summary: Create a new pipeline run for a project
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRunRequest"
      responses:
        "201":
          description: Run created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /projects/{projectId}/stories/{storyId}/runs:
    post:
      operationId: launchRun
      summary: Launch a pipeline run for a single story
      description: >
        Creates a pending run with steps derived from the project's pipeline config
        and enqueues async execution. Returns 409 if the story already has an active run,
        400 if the story is already done, 404 if the story or pipeline config is not found.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/StoryIdPath"
      responses:
        "201":
          description: Run created and execution enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunWithSteps"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /stories/{storyId}/runs:
    get:
      operationId: listRunsByStory
      summary: List runs for a story
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/StoryIdPath"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Paginated list of runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /runs/{runId}:
    get:
      operationId: getRun
      summary: Get a run by ID with its steps
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run details with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunWithSteps"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /runs/{runId}/steps/{stepId}/retry:
    post:
      operationId: retryFailedStep
      summary: Retry a failed run step
      description: >
        Triggers a retry of a failed run step. Creates a new retry step as a child
        of the failed step and enqueues the incremental retry action for execution.
        The run is transitioned back to running if it was in failed state.
        Returns 409 if the step is not in failed state or max retries exceeded.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunIdPath"
        - $ref: "#/components/parameters/StepIdPath"
      responses:
        "200":
          description: Retry initiated, returns updated run with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunWithSteps"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/runs/{runId}/pause:
    post:
      operationId: pauseRun
      summary: Pause a running story run
      description: >
        Sets the run status to paused. The currently executing step continues
        to completion, but no new steps are launched. Returns 409 if the run
        is not in a pausable state (must be running).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run paused successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/runs/{runId}/resume:
    post:
      operationId: resumeRun
      summary: Resume a paused story run
      description: >
        Resumes execution of a paused run from the last completed step.
        Returns 409 if the run is not in paused state.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run resumed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/runs/{runId}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel a pending, running, or paused story run
      description: >
        Transitions the run to cancelled status. If the run has a step currently
        executing in a container, the container is stopped. Pending steps are
        marked as cancelled. Returns 409 if the run is already in a terminal
        state (completed, failed, or cancelled).
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Run cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/epics/{epicId}/runs/{runId}/pause:
    post:
      operationId: pauseEpicRun
      summary: Pause an in-progress epic run
      description: >
        Pauses an epic run. Child runs that have not started are held,
        while currently running child runs continue to completion.
        Returns 409 if the epic run is not in a pausable state.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Epic run paused successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/epics/{epicId}/runs/{runId}/resume:
    post:
      operationId: resumeEpicRun
      summary: Resume a paused epic run
      description: >
        Resumes a paused epic run. Paused child runs are resumed and
        execution continues with the next dependency group.
        Returns 409 if the epic run is not in paused state.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Epic run resumed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /projects/{projectId}/epics/{epicId}/runs/{runId}/cancel:
    post:
      operationId: cancelEpicRun
      summary: Cancel a pending, running, or paused epic run
      description: >
        Cancels the epic run and all active child runs. Containers for
        running steps are stopped. Returns 409 if the run is already in a
        terminal state.
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/ProjectIdPath"
        - $ref: "#/components/parameters/EpicIdPath"
        - $ref: "#/components/parameters/RunIdPath"
      responses:
        "200":
          description: Epic run cancelled successfully
